{% extends "layout.html" %}
{% block title %}Login · Hardamissa Lotto{% endblock %}

{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-mark">HL</div>
    </div>

    <div class="auth-title">
      <h1>Hardamissa Lotto</h1>
      <p>Sign in to make your predictions</p>
    </div>

    <form method="post" action="{{ url_for('login') }}" class="auth-stack">
      <div class="form-field">
        <label class="form-label" for="login-username">Username</label>
        <input id="login-username" name="username" class="form-control" placeholder="Enter your username" required autofocus>
      </div>
      <div class="form-field">
        <label class="form-label" for="login-password">Password</label>
        <input id="login-password" name="password" type="password" class="form-control" placeholder="Enter your password" required>
      </div>
      <button class="btn btn-primary btn-block" type="submit">Sign In</button>
    </form>

    <div class="auth-footer">
      <span>Don't have an account?</span><a href="{{ url_for('register') }}">Register with invite code</a>
    </div>
  </div>
</div>
{% endblock %}
