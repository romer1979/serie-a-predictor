{% extends "layout.html" %}
{% block title %}Register · Hardamissa Lotto{% endblock %}

{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-mark">HL</div>
    </div>

    <div class="auth-title">
      <h1>Create Account</h1>
      <p>Join the prediction competition</p>
    </div>

    <form method="post" action="{{ url_for('register') }}" class="auth-stack">
      <div class="form-field">
        <label class="form-label" for="register-invite">Invite Code</label>
        <input id="register-invite" name="invite" class="form-control" placeholder="Enter your invite code" required autofocus>
        <span class="invite-hint">Ask an existing member for an invite code</span>
      </div>
      <div class="form-field">
        <label class="form-label" for="register-username">Username</label>
        <input id="register-username" name="username" class="form-control" placeholder="Choose a username" required>
      </div>
      <div class="form-field">
        <label class="form-label" for="register-password">Password</label>
        <input id="register-password" name="password" type="password" class="form-control" placeholder="Create a password" required>
      </div>
      <button class="btn btn-primary btn-block" type="submit">Create Account</button>
    </form>

    <div class="auth-footer">
      <span>Already have an account?</span><a href="{{ url_for('login') }}">Sign in</a>
    </div>
  </div>
</div>
{% endblock %}
